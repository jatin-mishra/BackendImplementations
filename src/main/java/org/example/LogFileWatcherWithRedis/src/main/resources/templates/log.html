<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Viewer</title>
    <style>
        body { background: #1e1e1e; color: #d4d4d4; font-family: monospace; padding: 1rem; }
        h2 { color: #9cdcfe; margin-bottom: 0.5rem; }
        #log-container {
            background: #252526;
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            padding: 1rem;
            max-height: 80vh;
            overflow-y: auto;
        }
        .line {
            white-space: pre-wrap;
            word-break: break-all;
            padding: 1px 0;
            border-bottom: 1px solid #2d2d2d;
        }
        .line:last-child { border-bottom: none; }
        #status { font-size: 0.8rem; margin-top: 0.5rem; color: #6a9955; }
    </style>
</head>
<body>
    <h2>Log Viewer</h2>
    <div id="log-container">
        <div th:each="line : ${lines}" th:text="${line}" class="line"></div>
    </div>
    <div id="status">Connecting to live stream...</div>

    <script>
        const container = document.getElementById('log-container');
        const status = document.getElementById('status');

        const es = new EventSource('/log/stream');

        es.onopen = () => {
            status.textContent = 'Live stream connected';
            status.style.color = '#6a9955';
        };

        es.onmessage = (event) => {
            const lines = JSON.parse(event.data);
            container.innerHTML = '';
            lines.forEach(line => {
                const div = document.createElement('div');
                div.className = 'line';
                div.textContent = line;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        };

        es.onerror = () => {
            status.textContent = 'Stream disconnected';
            status.style.color = '#f44747';
        };
    </script>
</body>
</html>
